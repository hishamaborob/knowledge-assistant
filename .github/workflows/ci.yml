name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx1024m'

jobs:

  # Fast feedback: unit tests + ArchUnit — no Docker required
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: ./mvnw test -B
        # -B = batch mode (no interactive prompts, better CI output)

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: backend/target/surefire-reports/

  # Slower: integration tests using Testcontainers (requires Docker)
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test  # Only run if unit tests pass
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run integration tests
        run: ./mvnw verify -B -DskipUnitTests
        env:
          # Testcontainers uses Docker — available on ubuntu-latest GitHub runners
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: backend/target/failsafe-reports/

  # Build Docker image and check it starts
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/prod/Dockerfile -t knowledge-assistant:ci .
