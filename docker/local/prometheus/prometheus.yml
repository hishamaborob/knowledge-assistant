global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'knowledge-assistant'
    metrics_path: '/actuator/prometheus'
    static_configs:
      # host.docker.internal resolves to the Docker host — the Spring Boot app running locally
      - targets: ['host.docker.internal:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'knowledge-assistant-local'
