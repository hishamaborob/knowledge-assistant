spring:
  application:
    name: knowledge-assistant

  # Spring Cloud AWS needs a region to initialize the SecretsManagerClient bean,
  # even when no spring.config.import references SM (e.g. in tests).
  # Profile-specific files (application-local.yml, application-prod.yml) override this
  # with the same value or with a LocalStack endpoint override.
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/knowledge_assistant}
    username: ${DB_USERNAME:ka_user}
    password: ${DB_PASSWORD:ka_password}
    hikari:
      # Max connections = (number of cores × 2) + effective_spindle_count.
      # For RDS t3.medium (2 vCPU), 10 is a reasonable starting point.
      # Too high: RDS max_connections exhaustion. Too low: throughput bottleneck.
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: ka-hikari

  jpa:
    hibernate:
      # none: Flyway owns the schema entirely. Hibernate neither validates nor modifies DDL.
      # Using validate here causes false negatives for custom types (e.g. pgvector's `vector`
      # type is unknown to Hibernate's dialect and fails validation even when the column exists).
      ddl-auto: none
    show-sql: false
    open-in-view: false  # Avoids lazy loading N+1s silently crossing transaction boundaries
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          fetch_size: 100
        order_inserts: true
        order_updates: true
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB

  # Java 21 virtual threads: Tomcat uses one virtual thread per request.
  # No thread pool tuning needed for request handling.
  threads:
    virtual:
      enabled: true

  # Exclude Spring AI's vectorstore auto-configuration — we use our own PgVectorAdapter.
  # Without this exclusion, PgVectorStoreAutoConfiguration requires exactly one EmbeddingModel
  # bean, which fails when both ollamaEmbeddingModel and openAiEmbeddingModel are on the classpath.
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration

  # Suppress auto-configuration for providers not active.
  # Without this, Spring AI fails at startup if API keys are missing
  # for providers we don't currently use.
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o}
          temperature: 0.1  # Low temp for factual RAG answers
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
          dimensions: 768  # text-embedding-3-small supports dimensions param; matches nomic-embed-text
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${ANTHROPIC_CHAT_MODEL:claude-sonnet-4-6}
    vertex:
      ai:
        gemini:
          project-id: ${GCP_PROJECT_ID:}
          location: ${GCP_LOCATION:us-central1}
          chat:
            options:
              model: ${GEMINI_CHAT_MODEL:gemini-1.5-pro}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    vectorstore:
      pgvector:
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 768  # matches nomic-embed-text; OpenAI models configured to 768 via dimensions param
        initialize-schema: false  # Flyway owns schema, not Spring AI auto-init

# Actuator: expose only what's needed. Never expose /env, /beans, /conditions in prod.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    prometheus:
      access: unrestricted
  info:
    git:
      mode: simple
    build:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${APP_ENV:local}

# Application-specific config
app:
  llm:
    # Active provider: openai | anthropic | gemini
    provider: ${LLM_PROVIDER:openai}
  embedding:
    # Active provider: ollama (local, free) | openai (production)
    provider: ${EMBEDDING_PROVIDER:openai}
    batch-size: 20
  storage:
    s3:
      bucket-name: ${S3_BUCKET_NAME:knowledge-assistant-docs-local}
      region: ${AWS_REGION:us-east-1}
  chunking:
    strategy: ${CHUNKING_STRATEGY:fixed}  # fixed | semantic
    chunk-size: ${CHUNK_SIZE:512}
    overlap: ${CHUNK_OVERLAP:64}
    semantic:
      split-threshold: 0.7  # Cosine similarity below this marks a chunk boundary
  similarity:
    threshold: 0.75  # Minimum cosine similarity score to include a chunk. Tune with eval.
    threshold-ollama: 0.5  # nomic-embed-text scores lower overall than OpenAI embeddings
    top-k: 10
  chat:
    history-window: 10  # Max prior messages (5 exchanges) injected into the LLM prompt
  evaluation:
    enabled: true
    sample-rate: 0.2  # Evaluate 20% of queries to bound LLM API cost
  question-condenser:
    enabled: true  # Set to false to disable for stateless /queries (has no effect there)
  security:
    api-keys: ${API_KEYS:}  # Empty = dev mode (no auth). Prod: set via Secrets Manager.

# SpringDoc: disable in production via app.springdoc.enabled=false
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

resilience4j:
  circuitbreaker:
    instances:
      llm:
        sliding-window-type: time-based
        sliding-window-size: 10
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      llm:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.net.ConnectException
          - java.io.IOException
  ratelimiter:
    instances:
      queryApi:
        limit-for-period: 20
        limit-refresh-period: 10s
        timeout-duration: 0s
      chatApi:
        limit-for-period: 20
        limit-refresh-period: 10s
        timeout-duration: 0s

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-},%X{spanId:-}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.kbassistant: INFO
